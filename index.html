<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sf6-moves</title>
<style>
  :root { --bg:#0e0f14; --panel:#15171f; --line:#2a2d3a; --text:#e6e8ee;
           --accent:#ff77c8; --muted:#8d92a3; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
          font-family:system-ui,-apple-system,sans-serif; }
  header { padding:36px 20px 8px; text-align:center; }
  h1 { margin:0; font-size:1.8rem; } h1 span { color:var(--accent); }
  .sub { color:var(--muted); font-size:0.9rem; margin-top:6px; }
  main { padding:24px 20px 60px; max-width:1100px; margin:0 auto;
          display:grid; gap:18px;
          grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); }
  a.char { text-decoration:none; color:var(--text); background:var(--panel);
            border:1px solid var(--line); border-radius:10px; overflow:hidden;
            display:block; transition:border-color .15s, transform .15s; }
  a.char:hover { border-color:var(--accent); transform:translateY(-2px); }
  a.char .thumb { width:100%; aspect-ratio:16/9; object-fit:cover;
                   background:#000; display:block; }
  a.char .name { padding:12px 14px; font-size:1.1rem; font-weight:700; }
  a.char .meta { padding:0 14px 14px; color:var(--muted); font-size:0.82rem;
                  margin-top:-6px; }
  footer { color:var(--muted); font-size:0.8rem; padding:0 20px 40px;
            max-width:1100px; margin:0 auto; text-align:center; }
</style></head>
<body>
<header><h1>sf6<span>-moves</span></h1>
  <div class="sub">1 character &middot; 63 moves
    &middot; generated June 01, 2026 12:50 AM PT</div></header>
<main>
  <a class="char" href="ingrid/"><img class="thumb" loading="lazy" src="ingrid/gifs/order-of-the-sun-053126.gif" alt=""><div class="name">Ingrid</div><div class="meta">63 moves</div></a>
</main>
<footer>Street Fighter 6 and all characters, artwork, and animations shown are
  &copy; CAPCOM &mdash; all rights to the displayed content belong to Capcom.
  Unofficial non-commercial fan reference.</footer>
</body></html>
